<!DOCTYPE html>
<html>
<head>
    <title>DeepSORT Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-5 text-center">

    <h1 class="mb-4">🎯 Tracking Results</h1>

    <!-- Processed Video -->
    <div class="card bg-secondary p-4 mb-4">
        <h4 class="mb-3">Processed Video</h4>

        <video width="100%" controls>
            <source src="{{ url_for('output_file', filename=video_file) }}" type="video/mp4">
            Your browser does not support video.
        </video>

        <a href="{{ url_for('output_file', filename=video_file) }}"
           class="btn btn-success mt-3"
           download>
           ⬇ Download Processed Video
        </a>
    </div>

    <!-- Metrics -->
    <div class="card bg-secondary p-4 mb-4">
        <h4 class="mb-3">Performance Metrics</h4>

        {% if metrics %}
            <ul class="list-group">
                {% for key, value in metrics.items() %}
                    <li class="list-group-item bg-dark text-light">
                        <strong>{{ key }}</strong>: {{ value }}
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p>No metrics available.</p>
        {% endif %}
    </div>

    <!-- Back Button -->
    <a href="/" class="btn btn-warning">⬅ Process Another Video</a>

</div>

</body>
</html>
