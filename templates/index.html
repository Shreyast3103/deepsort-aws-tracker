<!DOCTYPE html>
<html>
<head>
    <title>DeepSORT AI Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container text-center mt-5">
    <h1 class="mb-4">🚀 DeepSORT AI Video Tracker</h1>

    <div class="card p-4 bg-secondary">
        <form action="/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="video" class="form-control mb-3" required>
            <button type="submit" class="btn btn-warning w-100">Process Video</button>
        </form>
    </div>

</div>

</body>
</html>
